name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Create Release PR or Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          command: manifest
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish-ghcr:
    name: Build and Publish GHCR Image
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.releases_created == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          TAG="${{ needs.release-please.outputs.tag_name }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(git tag --list 'ts-to-mkv-v*' --sort=-version:refname | head -n1)"
          fi
          if [[ -z "$TAG" ]]; then
            TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to determine release tag" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: git checkout "${{ steps.release-tag.outputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release type
        id: release-type
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release-tag.outputs.tag }}"
          if [[ "$TAG" == ts-to-mkv-v* ]]; then
            VERSION="${TAG#ts-to-mkv-v}"
          elif [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          else
            VERSION=""
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ -z "$VERSION" ]] || [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release-type.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release-type.outputs.is_prerelease == 'false' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
