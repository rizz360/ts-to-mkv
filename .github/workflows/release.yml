name: Release

on:
  push:
    tags:
      - "v*"
      - "ts2mkv-v*"
      - "ts-to-mkv-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    name: Build and Publish GHCR Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release type
        id: release-type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == ts2mkv-v* ]]; then
            VERSION="${TAG#ts2mkv-v}"
          elif [[ "$TAG" == ts-to-mkv-v* ]]; then
            VERSION="${TAG#ts-to-mkv-v}"
          elif [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          else
            VERSION=""
          fi
          if [[ -z "$VERSION" ]] || [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=match,pattern=^ts2mkv-v(.*)$,group=1
            type=match,pattern=^ts-to-mkv-v(.*)$,group=1
            type=match,pattern=^v(.*)$,group=1
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release-type.outputs.is_prerelease == 'false' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
