name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  shell-tests:
    name: Shell Safety and Modular Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools are available
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run safety checks
        run: bash service/test_safety.sh

      - name: Run modular checks
        run: bash service/test_modular.sh

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: shell-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ts-to-mkv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
