services:
  ts-to-mkv:
    image: ghcr.io/rizz360/ts-to-mkv:latest
    pull_policy: always
    # Local development fallback:
    # build: .
    container_name: ts-to-mkv
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/input/ts-recordings:/input
      - /mnt/output/mkv-library:/output
    entrypoint: /app/entrypoint.sh
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:${WEB_PORT:-8080}"    # web dashboard (localhost only)
    environment:
      # --- Container Runtime ---
      TZ: Europe/Luxembourg
      PUID: 1000
      PGID: 1000

      # --- Web Dashboard ---
      # Port for the built-in status dashboard (http://<host>:8080)
      WEB_PORT: "8080"

      # --- Optional External Config File ---
      # TS_TO_MKV_CONFIG takes precedence; set it to a mounted file path to override compose values.
      # Leave empty (or unset) to use compose environment values only.
      TS_TO_MKV_CONFIG: ""

      # --- File Handling ---
      # Delete .ts files after success
      DELETE_TS: "true"
      # Files larger than this will be re-encoded (HD content only)
      REMUX_SIZE_GB: "3"
      # Retry remux without subtitles if failed
      REMUX_FALLBACK_NO_SUBTITLES: "true"

      # --- Processing Mode ---
      # 'watch' for real-time file monitoring, 'poll' for periodic scanning, 'once' for single run
      MONITOR_MODE: watch
      # Seconds between scans when using poll mode (5 minutes default)
      POLL_INTERVAL: "300"

      # --- Processing Settings ---
      # Enable parallel processing (true/false)
      ENABLE_PARALLEL_PROCESSING: "false"
      # Number of concurrent encoding jobs (only used if parallel processing enabled)
      MAX_CONCURRENT_JOBS: "2"

      # --- Encoding Settings ---
      # Primary video codec (hevc_qsv, libx265, libx264)
      VIDEO_CODEC: hevc_qsv
      # Fallback codec if hardware encoding fails
      FALLBACK_CODEC: libx265
      # Copy all audio streams
      AUDIO_CODEC: copy
      # Always encode SD content (576p/i, 480p/i) for better compression
      FORCE_ENCODE_SD: "true"

      # --- Resolution-specific Bitrates ---
      # Traditional bitrate mode
      # 1080p/1080i bitrate
      BITRATE_1080: 4000k
      # 720p/720i bitrate
      BITRATE_720: 2500k
      # 576p/576i bitrate
      BITRATE_576: 1500k
      # 480p/480i bitrate
      BITRATE_480: 1200k
      # Fallback bitrate for other resolutions
      BITRATE_DEFAULT: 2000k

      # --- Quality-based Encoding (CRF) ---
      # Use Constant Rate Factor instead of bitrate (recommended for better quality/size ratio)
      USE_CRF: "false"
      # 1080p/1080i CRF value (lower = higher quality)
      CRF_1080: "23"
      # 720p/720i CRF value
      CRF_720: "24"
      # 576p/576i CRF value
      CRF_576: "26"
      # 480p/480i CRF value
      CRF_480: "28"
      # Fallback CRF value
      CRF_DEFAULT: "24"

      # --- Resolution-specific Presets ---
      # Preset for HD content (720p+)
      PRESET_HD: fast
      # Preset for SD content (576p/480p) - slower but better compression
      PRESET_SD: medium

      # --- Advanced Settings ---
      # Skip files already encoded with HEVC at reasonable bitrate
      SKIP_ALREADY_HEVC: "true"
      # Skip HEVC files with bitrate below this (bits per second)
      HEVC_BITRATE_THRESHOLD: "3000000"

      # --- Notifications ---
      # Optional: ntfy endpoint for notifications
      NTFY_URL: ""

      # Temporary file management
      # --- Temp and Logging Paths ---
      # Use faster storage for temp files
      TEMP_DIR: /tmp/ts-processing
      CLEANUP_TEMP_ON_FAILURE: "true"
      LOG_DIR: /app/logs
    # restart: unless-stopped
networks: {}
