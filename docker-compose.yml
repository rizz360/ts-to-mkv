services:
  ts-cleanup:
    build: . # This tells Docker to build the Dockerfile in the current directory
    container_name: ts-cleanup
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/hjem_nas_dvr/Encode-Queue/:/input
      - /mnt/hjem_nas_media/Movies:/output
      - ./config:/config:ro
      - ./app:/app
      - ./tests:/tests:ro
    entrypoint: /app/entrypoint.sh
    environment:
      - TZ=Europe/Luxembourg
      - PUID=1000
      - PGID=1000
    # restart: unless-stopped
networks: {}
